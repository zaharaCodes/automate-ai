<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — AutoMate AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060609;--bg2:#0f0f18;--bg3:#16161f;--bg4:#1e1e2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#ededf5;--text2:#9090a8;--text3:#505068;
  --accent:#6366f1;--green:#10b981;--red:#f43f5e;--yellow:#f59e0b;
  --font:'Outfit',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Login screen */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.login-box{
  width:100%;max-width:380px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:16px;padding:36px;
  animation:fadeUp 0.3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-box h1{font-size:20px;font-weight:800;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text3);margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text3);margin-bottom:6px}
.field input{
  width:100%;padding:11px 14px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--font);font-size:14px;
  outline:none;transition:border-color 0.2s;
}
.field input:focus{border-color:var(--accent)}
.err{font-size:13px;color:#fb7185;margin-bottom:12px;display:none}
.btn-primary{
  width:100%;padding:11px;background:var(--accent);color:#fff;
  border:none;border-radius:8px;font-family:var(--font);font-size:14px;
  font-weight:700;cursor:pointer;transition:all 0.18s;
}
.btn-primary:hover{background:#5254e8;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* Admin panel */
#adminPanel{display:none;min-height:100vh}
.top-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 32px;height:58px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10;
}
.top-bar-logo{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.admin-badge{
  font-family:var(--mono);font-size:9px;text-transform:uppercase;
  letter-spacing:1px;padding:3px 8px;border-radius:99px;
  background:rgba(244,63,94,0.12);border:1px solid rgba(244,63,94,0.25);
  color:#fb7185;
}
.top-bar-right{display:flex;align-items:center;gap:12px}
.last-refresh{font-family:var(--mono);font-size:11px;color:var(--text3)}
.refresh-btn{
  padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:7px;color:var(--text2);font-family:var(--font);font-size:13px;
  font-weight:600;cursor:pointer;transition:all 0.18s;
}
.refresh-btn:hover{color:var(--text);border-color:var(--border2)}
.logout-btn{
  padding:7px 14px;background:transparent;border:1px solid rgba(244,63,94,0.25);
  border-radius:7px;color:#fb7185;font-family:var(--font);font-size:13px;
  font-weight:600;cursor:pointer;transition:all 0.18s;
}
.logout-btn:hover{background:rgba(244,63,94,0.08)}

.admin-body{padding:32px;max-width:1200px;margin:0 auto}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:22px;
}
.stat-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px}
.stat-val{font-size:34px;font-weight:900;letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
.stat-sub{font-size:12px;color:var(--text3)}
.stat.highlight{border-color:rgba(var(--aRGB-accent, 99,102,241),0.3)}

/* Chart */
.chart-section{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:24px;margin-bottom:28px;
}
.section-title{font-size:14px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.section-title span{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:3px 8px;background:var(--bg3);border-radius:99px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{
  width:100%;border-radius:4px 4px 0 0;
  background:linear-gradient(180deg,var(--accent),rgba(99,102,241,0.4));
  min-height:4px;transition:height 0.6s cubic-bezier(0.16,1,0.3,1);
}
.bar-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center}
.bar-count{font-family:var(--mono);font-size:10px;color:var(--text2);font-weight:600}

/* Users table */
.table-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px}
.table-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-search{
  padding:7px 12px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-family:var(--font);font-size:13px;
  outline:none;width:220px;transition:border-color 0.2s;
}
.table-search:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse}
thead th{
  padding:12px 20px;text-align:left;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);
  background:var(--bg3);border-bottom:1px solid var(--border);
}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.18s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:13px 20px;font-size:13px;color:var(--text2)}
tbody td:first-child{color:var(--text);font-weight:600}
.plan-tag{
  display:inline-block;font-family:var(--mono);font-size:9px;
  text-transform:uppercase;letter-spacing:0.8px;padding:2px 8px;border-radius:99px;
}
.plan-free{background:rgba(255,255,255,0.06);color:var(--text3)}
.plan-pro{background:rgba(99,102,241,0.12);color:#818cf8}
.date-cell{font-family:var(--mono);font-size:11px;color:var(--text3)}
.email-cell{font-family:var(--mono);font-size:11px;color:var(--text2)}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);background:var(--bg3)}
.page-info{font-family:var(--mono);font-size:11px;color:var(--text3)}
.page-btns{display:flex;gap:6px}
.page-btn{
  padding:5px 12px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:6px;color:var(--text2);font-family:var(--font);font-size:12px;
  font-weight:600;cursor:pointer;transition:all 0.18s;
}
.page-btn:hover{color:var(--text);border-color:var(--border2)}
.page-btn:disabled{opacity:0.3;cursor:not-allowed}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:12px;font-family:var(--mono);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

:root{--aRGB-accent:99,102,241}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🔒 Admin Access</h1>
    <p>AutoMate AI — Internal Dashboard</p>
    <div class="err" id="loginErr">Incorrect secret key</div>
    <div class="field">
      <label>Admin Secret Key</label>
      <input type="password" id="secretInput" placeholder="Enter your admin secret..."/>
    </div>
    <button class="btn-primary" id="loginBtn">Access Dashboard</button>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel">
  <div class="top-bar">
    <div class="top-bar-logo">
      ⚡ AutoMate AI
      <span class="admin-badge">Admin</span>
    </div>
    <div class="top-bar-right">
      <span class="last-refresh" id="lastRefresh">—</span>
      <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Stat cards -->
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">Total Users</div>
        <div class="stat-val" id="sTotalUsers">—</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat">
        <div class="stat-label">New Today</div>
        <div class="stat-val" style="color:var(--green)" id="sToday">—</div>
        <div class="stat-sub">last 24 hours</div>
      </div>
      <div class="stat">
        <div class="stat-label">This Week</div>
        <div class="stat-val" style="color:var(--accent)" id="sWeek">—</div>
        <div class="stat-sub">last 7 days</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pro Users</div>
        <div class="stat-val" style="color:var(--yellow)" id="sPro">—</div>
        <div class="stat-sub" id="sProPct">of total</div>
      </div>
    </div>

    <!-- Signups chart -->
    <div class="chart-section">
      <div class="section-title">Signups <span>Last 7 Days</span></div>
      <div class="bar-chart" id="barChart">
        <div class="loading"><div class="spinner"></div>Loading chart...</div>
      </div>
    </div>

    <!-- Users table -->
    <div class="table-section">
      <div class="table-head">
        <div class="section-title" style="margin-bottom:0">All Users <span id="totalLabel">—</span></div>
        <input class="table-search" id="tableSearch" placeholder="Search by name or email..."/>
      </div>
      <div id="tableBody">
        <div class="loading"><div class="spinner"></div>Loading users...</div>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <span class="page-info" id="pageInfo">Page 1</span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = window.location.origin;
let adminSecret = '';
let currentPage = 1;
let totalPages  = 1;
let allUsers    = [];

// ── Login ───────────────────────────────────────────────
document.getElementById('secretInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const secret = document.getElementById('secretInput').value.trim();
  if (!secret) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Checking...';

  try {
    const res  = await fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-secret': secret } });
    const data = await res.json();

    if (!data.success) throw new Error('Wrong secret');

    adminSecret = secret;
    sessionStorage.setItem('admin_secret', secret);
    showPanel();
    loadAll();
  } catch {
    document.getElementById('loginErr').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Access Dashboard';
  }
});

// Check session
const saved = sessionStorage.getItem('admin_secret');
if (saved) { adminSecret = saved; showPanel(); loadAll(); }

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display  = 'block';
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_secret');
  location.reload();
});

document.getElementById('refreshBtn').addEventListener('click', loadAll);

// ── Load all data ───────────────────────────────────────
async function loadAll() {
  await Promise.all([loadStats(), loadUsers(1)]);
  document.getElementById('lastRefresh').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

// ── Stats ───────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-secret': adminSecret } });
    const data = await res.json();
    if (!data.success) return;

    const s = data.stats;
    document.getElementById('sTotalUsers').textContent = s.totalUsers;
    document.getElementById('sToday').textContent      = s.newToday;
    document.getElementById('sWeek').textContent       = s.newThisWeek;
    document.getElementById('sPro').textContent        = s.proUsers;
    document.getElementById('sProPct').textContent     =
      s.totalUsers ? `${Math.round((s.proUsers / s.totalUsers) * 100)}% of total` : 'of total';

    renderChart(s.dailySignups);
  } catch(e) { console.log('Stats error:', e); }
}

// ── Chart ───────────────────────────────────────────────
function renderChart(data) {
  const chart = document.getElementById('barChart');
  if (!data || !data.length) {
    chart.innerHTML = `<div style="color:var(--text3);font-family:var(--mono);font-size:12px;padding:20px">No signup data for the past 7 days yet.</div>`;
    return;
  }

  // Fill missing days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const found = data.find(x => x._id === key);
    days.push({ date: key, count: found ? found.count : 0, label: d.toLocaleDateString('en-US', { weekday: 'short' }) });
  }

  const max = Math.max(...days.map(d => d.count), 1);

  chart.innerHTML = days.map(d => `
    <div class="bar-wrap">
      <div class="bar-count">${d.count || ''}</div>
      <div class="bar" style="height:${Math.max(4, (d.count / max) * 100)}px"></div>
      <div class="bar-label">${d.label}</div>
    </div>
  `).join('');
}

// ── Users table ─────────────────────────────────────────
async function loadUsers(page = 1) {
  currentPage = page;
  document.getElementById('tableBody').innerHTML =
    `<div class="loading"><div class="spinner"></div>Loading users...</div>`;

  try {
    const res  = await fetch(`${API}/api/admin/users?page=${page}&limit=15`, {
      headers: { 'x-admin-secret': adminSecret }
    });
    const data = await res.json();
    if (!data.success) return;

    allUsers   = data.users;
    totalPages = data.pages;
    document.getElementById('totalLabel').textContent = data.total + ' total';

    renderTable(data.users);
    renderPagination(data.total, data.pages);
  } catch(e) { console.log('Users error:', e); }
}

function renderTable(users) {
  if (!users.length) {
    document.getElementById('tableBody').innerHTML =
      `<div class="loading" style="color:var(--text3)">No users found</div>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Plan</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td>${escHtml(u.name)}</td>
            <td class="email-cell">${escHtml(u.email)}</td>
            <td><span class="plan-tag plan-${u.plan || 'free'}">${u.plan || 'free'}</span></td>
            <td class="date-cell">${formatDate(u.createdAt)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderPagination(total, pages) {
  const pag  = document.getElementById('pagination');
  const btns = document.getElementById('pageBtns');

  if (pages <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';

  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${pages} · ${total} users`;

  let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadUsers(${currentPage - 1})">← Prev</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 1) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadUsers(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      html += `<span style="color:var(--text3);padding:0 4px">…</span>`;
    }
  }
  html += `<button class="page-btn" ${currentPage === pages ? 'disabled' : ''} onclick="loadUsers(${currentPage + 1})">Next →</button>`;
  btns.innerHTML = html;
}

// ── Search ──────────────────────────────────────────────
document.getElementById('tableSearch').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  if (!q) { renderTable(allUsers); return; }
  renderTable(allUsers.filter(u =>
    u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
  ));
});

// ── Helpers ─────────────────────────────────────────────
function formatDate(str) {
  return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
